[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "voltx-sdk"
version = "0.1.0"
description = "Official Python SDK for the Voltx public API"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = ["requests>=2.31,<3"]

[project.optional-dependencies]
dev = ["pytest>=8,<9"]

[tool.setuptools.packages.find]
include = ["voltx_sdk*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
