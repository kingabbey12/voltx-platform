services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: voltx
      POSTGRES_PASSWORD: voltx
      POSTGRES_DB: voltx
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U voltx -d voltx']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
