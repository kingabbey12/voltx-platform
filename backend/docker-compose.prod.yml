services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voltx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-voltx}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-voltx} -d ${POSTGRES_DB:-voltx}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voltx

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - voltx

  # One-off migration runner: built from the `build` stage (has the Prisma
  # CLI as a devDependency; the `production` stage intentionally doesn't,
  # to keep the running image lean) so `docker compose -f
  # docker-compose.prod.yml run --rm migrate` applies pending migrations
  # before rolling `api` — a single explicit step, not baked into every
  # container boot (which would race across replicas on scale-out).
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-voltx}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-voltx}
    depends_on:
      postgres:
        condition: service_healthy
    # Seed runs every deploy, not just the first one: it's a destructive
    # sync (deletes+recreates each role's permission set from the current
    # PERMISSION_DEFINITIONS/ROLE_DEFINITIONS) rather than an insert-once
    # script, specifically so a new permission added to the catalog (e.g.
    # `integration.*`) actually reaches existing roles on the next deploy
    # instead of silently 403ing every request until someone thinks to
    # re-seed by hand.
    entrypoint: ['sh', '-c', 'pnpm prisma:migrate:deploy && pnpm prisma:seed']
    networks:
      - voltx
    profiles:
      - tools

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-voltx}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-voltx}
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - voltx

volumes:
  postgres_data:
  redis_data:

networks:
  voltx:
    driver: bridge
