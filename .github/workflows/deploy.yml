name: Deploy

# Runs only after the CI workflow succeeds on main (automatic staging →
# production promotion), or on demand for a single environment. Production is
# gated by the GitHub `production` Environment's required-reviewer protection
# (Settings → Environments → production → Required reviewers) — that is where
# the human approval lives; this workflow just declares the environment.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
      action:
        description: 'deploy a new build, or roll back to the last known-good image'
        required: true
        default: 'deploy'
        type: choice
        options: [deploy, rollback]
      image_tag:
        description: 'Rollback only: explicit image ref to restore (blank = last known-good)'
        required: false
        default: ''

concurrency:
  # Serialize per environment; never cancel an in-flight deploy.
  group: deploy-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  setup:
    name: Resolve deploy plan
    runs-on: ubuntu-latest
    # Auto path only proceeds when CI actually passed.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      sha: ${{ steps.plan.outputs.sha }}
      action: ${{ steps.plan.outputs.action }}
      image_tag: ${{ steps.plan.outputs.image_tag }}
      image_repo: ${{ steps.plan.outputs.image_repo }}
      run_staging: ${{ steps.plan.outputs.run_staging }}
      run_production: ${{ steps.plan.outputs.run_production }}
    steps:
      - id: plan
        run: |
          set -euo pipefail
          repo_lc="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Deploy exactly the commit CI validated, and promote through both
            # environments (production still waits on its approval gate).
            {
              echo "image_repo=ghcr.io/${repo_lc}/backend"
              echo "sha=${{ github.event.workflow_run.head_sha }}"
              echo "action=deploy"
              echo "image_tag="
              echo "run_staging=true"
              echo "run_production=true"
            } >> "$GITHUB_OUTPUT"
          else
            if [ "${{ github.event.inputs.environment }}" = "staging" ]; then
              run_staging=true;  run_production=false
            else
              run_staging=false; run_production=true
            fi
            {
              echo "image_repo=ghcr.io/${repo_lc}/backend"
              echo "sha=${{ github.sha }}"
              echo "action=${{ github.event.inputs.action }}"
              echo "image_tag=${{ github.event.inputs.image_tag }}"
              echo "run_staging=${run_staging}"
              echo "run_production=${run_production}"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Show plan
        run: |
          echo "SHA=${{ steps.plan.outputs.sha }}"
          echo "action=${{ steps.plan.outputs.action }}"
          echo "run_staging=${{ steps.plan.outputs.run_staging }} run_production=${{ steps.plan.outputs.run_production }}"

  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: setup
    # Rollback reuses an already-published image; only deploy builds.
    if: needs.setup.outputs.action == 'deploy'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: production
          push: true
          tags: |
            ${{ needs.setup.outputs.image_repo }}:${{ needs.setup.outputs.sha }}
            ${{ needs.setup.outputs.image_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: [setup, build-and-push]
    if: >-
      always() &&
      needs.setup.outputs.run_staging == 'true' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    environment:
      name: staging
      url: ${{ vars.HEALTH_CHECK_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      # Explicit, auditable, run-once-per-deploy — not baked into the image
      # entrypoint, so N replicas don't race the same migration. Skipped on
      # rollback: a rollback must not re-run migrations against an older image.
      - name: Run database migrations
        if: needs.setup.outputs.action == 'deploy'
        working-directory: backend
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync permission catalog
        if: needs.setup.outputs.action == 'deploy'
        working-directory: backend
        run: pnpm prisma:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy and verify
        uses: ./.github/actions/deploy-and-verify
        with:
          environment: staging
          mode: ${{ needs.setup.outputs.action }}
          image-repo: ${{ needs.setup.outputs.image_repo }}
          sha: ${{ needs.setup.outputs.sha }}
          image-tag: ${{ needs.setup.outputs.image_tag }}
          health-url: ${{ vars.HEALTH_CHECK_URL }}
          registry-username: ${{ github.actor }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}

  production:
    name: Deploy production
    runs-on: ubuntu-latest
    # Auto path promotes only after staging is green; a direct production
    # dispatch skips staging. Either way the `production` environment's
    # required reviewers must approve before this job starts.
    needs: [setup, build-and-push, staging]
    if: >-
      always() &&
      needs.setup.outputs.run_production == 'true' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') &&
      (needs.staging.result == 'success' || needs.staging.result == 'skipped')
    environment:
      name: production
      url: ${{ vars.HEALTH_CHECK_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        if: needs.setup.outputs.action == 'deploy'
        working-directory: backend
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync permission catalog
        if: needs.setup.outputs.action == 'deploy'
        working-directory: backend
        run: pnpm prisma:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy and verify
        uses: ./.github/actions/deploy-and-verify
        with:
          environment: production
          mode: ${{ needs.setup.outputs.action }}
          image-repo: ${{ needs.setup.outputs.image_repo }}
          sha: ${{ needs.setup.outputs.sha }}
          image-tag: ${{ needs.setup.outputs.image_tag }}
          health-url: ${{ vars.HEALTH_CHECK_URL }}
          registry-username: ${{ github.actor }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}
