name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: echo "image=ghcr.io/${{ github.repository }}/backend:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate-and-deploy:
    name: Migrate & deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      # Runs from the checked-out source (has the Prisma CLI as a
      # devDependency) against the target environment's database — kept
      # as an explicit, auditable step rather than baked into the image's
      # entrypoint, so migrations run exactly once per deploy regardless
      # of how many replicas the next step brings up.
      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        working-directory: backend
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Neon's pooled endpoint (what DATABASE_URL should be, for
          # runtime) can't run migrations — this must be Neon's separate
          # "direct connection" string. Owner action: add a DIRECT_URL
          # secret to this environment from the Neon dashboard if it isn't
          # set yet; migrate:deploy fails loudly (not silently) without it.
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      # Idempotent sync (deletes+recreates each role's permission set from
      # the current PERMISSION_DEFINITIONS/ROLE_DEFINITIONS) — without this,
      # a permission added to the catalog after the last deploy silently
      # 403s every request that needs it until someone re-seeds by hand.
      - name: Sync permission catalog
        working-directory: backend
        run: pnpm prisma:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Target is Render (see render.yaml at the repo root), deployed as an
      # explicit CI-triggered step rather than Render's own auto-deploy —
      # this runs only after the migration + permission-sync steps above
      # succeed, so the new image never goes live against a database it
      # doesn't match yet.
      - name: Deploy to Render
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          ENVIRONMENT="${{ github.event.inputs.environment || 'staging' }}"

          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "::warning::Skipping Render deploy — RENDER_API_KEY and/or RENDER_SERVICE_ID" \
              "are not set as secrets on the '${ENVIRONMENT}' GitHub environment."
            echo "The image was built, pushed, and migrated successfully:"
            echo "  ${IMAGE}"
            echo "Owner action required: in the Render dashboard, create the voltx-backend"
            echo "service from render.yaml (Blueprint), then add its Service ID and an API"
            echo "key (Account Settings -> API Keys) as RENDER_SERVICE_ID/RENDER_API_KEY"
            echo "secrets on this repo's '${ENVIRONMENT}' GitHub environment. Once set,"
            echo "re-run this workflow (workflow_dispatch) to deploy ${IMAGE}."
            exit 0
          fi

          # Point the Render service at this run's freshly-built, migrated
          # image, then trigger a deploy of it. Two calls because Render's
          # image-backed services store the image reference on the service
          # resource itself; verify this against Render's current API docs
          # (api-docs.render.com) if it starts returning errors — their API
          # has changed shape before.
          curl --fail --silent --show-error \
            -X PATCH "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"imageUrl\": \"${IMAGE}\"}"

          curl --fail --silent --show-error \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'

          echo "Deploy triggered on Render for ${IMAGE} (${ENVIRONMENT})."
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
