name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, test, e2e, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: voltx
          POSTGRES_PASSWORD: voltx
          POSTGRES_DB: voltx_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U voltx -d voltx_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Create .env.test
        # .env.test is gitignored by design (same convention as .env/.env.local
        # — no env files committed), so CI has to materialize it itself.
        # AUTH_RATE_LIMIT_LIMIT is raised because e2e specs call loginAs()
        # dozens of times per run under --runInBand from a single IP, which
        # would otherwise trip the production auth-endpoint throttle (10/60s).
        run: |
          cat > .env.test <<EOF
          NODE_ENV=test
          PORT=3000
          LOG_LEVEL=silent
          DATABASE_URL=postgresql://voltx:voltx@localhost:5433/voltx_test
          JWT_ACCESS_SECRET=ci-jwt-access-secret-minimum-32-characters-long
          JWT_ACCESS_EXPIRES_IN=15m
          AUTH_RATE_LIMIT_LIMIT=1000
          AUTH_RATE_LIMIT_TTL_SECONDS=60
          INTEGRATIONS_ENCRYPTION_KEY=ci-only-integrations-encryption-key
          INTEGRATIONS_WEBHOOK_BASE_URL=http://localhost:3000
          GOOGLE_OAUTH_CLIENT_ID=test-google-client-id
          GOOGLE_OAUTH_CLIENT_SECRET=test-google-client-secret
          EOF

      - name: Run migrations (test database)
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://voltx:voltx@localhost:5433/voltx_test

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build

  web:
    name: Web (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3000/api/v1

  marketing:
    name: Marketing (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/marketing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  mobile:
    name: Mobile (analyze, test, build macos)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.4'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # `flutter build macos --release` requires Apple code signing, and
      # `flutter build macos` has no --no-codesign flag (that exists only for
      # iOS/APK builds). PR/CI runs have no certificates and must not need
      # them, so generate the native project without building (--config-only,
      # a real Flutter flag) and compile it with xcodebuild using the
      # documented CODE_SIGNING_ALLOWED=NO setting. This verifies the macOS
      # app compiles, unsigned. The workspace, scheme, and Release
      # configuration are the ones defined in apps/mobile/macos. Production
      # release signing lives in the release workflow and is unchanged.
      - name: Build macOS (unsigned compile check)
        run: |
          flutter build macos --config-only --release
          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build
