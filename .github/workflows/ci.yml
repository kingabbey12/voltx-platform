name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, test, e2e, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: voltx
          POSTGRES_PASSWORD: voltx
          POSTGRES_DB: voltx_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U voltx -d voltx_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Create .env.test
        # .env.test is gitignored by design (same convention as .env/.env.local
        # — no env files committed), so CI has to materialize it itself.
        # AUTH_RATE_LIMIT_LIMIT is raised because e2e specs call loginAs()
        # dozens of times per run under --runInBand from a single IP, which
        # would otherwise trip the production auth-endpoint throttle (10/60s).
        # DATABASE_SEED_ON_BOOTSTRAP=false: the e2e harness seeds deterministically
        # via resetAndSeedAuthTestData() in beforeEach — the boot-time auto-repair
        # (DatabaseSeedBootstrapService) is a production/staging safety net and
        # must not race with the test harness's own controlled seed/reset cycle.
        run: |
          cat > .env.test <<EOF
          NODE_ENV=test
          PORT=3000
          LOG_LEVEL=silent
          DATABASE_URL=postgresql://voltx:voltx@localhost:5433/voltx_test
          DIRECT_URL=postgresql://voltx:voltx@localhost:5433/voltx_test
          JWT_ACCESS_SECRET=ci-jwt-access-secret-minimum-32-characters-long
          JWT_ACCESS_EXPIRES_IN=15m
          AUTH_RATE_LIMIT_LIMIT=1000
          AUTH_RATE_LIMIT_TTL_SECONDS=60
          INTEGRATIONS_ENCRYPTION_KEY=ci-only-integrations-encryption-key
          INTEGRATIONS_WEBHOOK_BASE_URL=http://localhost:3000
          DATABASE_SEED_ON_BOOTSTRAP=false
          EOF

      - name: Run migrations (test database)
        run: pnpm prisma:migrate:deploy
        env:
          DATABASE_URL: postgresql://voltx:voltx@localhost:5433/voltx_test
          DIRECT_URL: postgresql://voltx:voltx@localhost:5433/voltx_test

      - name: E2E tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build

  web:
    name: Web (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # CI never actually calls the API — this just has to satisfy
          # apps/web/src/config/env.ts's build-time validation (a real
          # absolute URL, no /auth|/login|/health path segment) since the
          # value gets inlined into the client bundle at build time.
          NEXT_PUBLIC_API_BASE_URL: https://api.ci.usevoltx.example/api/v1

  marketing:
    name: Marketing (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/marketing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/marketing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  mobile:
    name: Mobile (analyze, test, build macos)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.4'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS (release, production flavor)
        # -t lib/main_production.dart is required: the default lib/main.dart
        # entrypoint resolves its API URL via --dart-define at runtime and
        # falls back to localhost when that's unset, so building it here
        # would never actually validate what a real release build ships.
        # main_production.dart hardcodes the production environment instead.
        run: flutter build macos --release -t lib/main_production.dart

  sdk-typescript:
    name: SDK TypeScript (lint, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        # No lockfile is committed for this package — npm install, not npm ci.
        run: npm install

      - name: Lint (typecheck)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  cli:
    name: CLI (lint, build, test)
    runs-on: ubuntu-latest
    needs: sdk-typescript
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build the local @voltx/sdk dependency
        # packages/cli depends on @voltx/sdk via a `file:../sdk-typescript`
        # reference, resolved as a symlink by npm install below — the
        # target directory needs its dist/ already built before that.
        working-directory: packages/sdk-typescript
        run: |
          npm install
          npm run build

      - name: Install dependencies
        run: npm install

      - name: Lint (typecheck)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  sdk-python:
    name: SDK Python (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest

  sdk-flutter:
    name: SDK Flutter (analyze, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-flutter
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.4'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
