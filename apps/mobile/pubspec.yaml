name: voltx_mobile
description: Voltx Platform mobile application foundation.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  connectivity_plus: ^6.1.4
  dio: ^5.8.0+1
  flutter_hooks: ^0.21.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  freezed_annotation: ^3.0.0
  go_router: ^14.8.1
  hooks_riverpod: ^2.6.1
  json_annotation: ^4.12.0
  flutter_markdown: ^0.7.7+1
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  sentry_flutter: ^9.23.0
  package_info_plus: ^9.0.1
  crypto: ^3.0.7
  app_links: ^7.2.0
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  mime: ^2.0.0
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1

dev_dependencies:
  build_runner: ^2.4.15
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true

# file_picker 8.3.7's own android/build.gradle hardcodes compileSdk 34, but
# its transitive dependency flutter_plugin_android_lifecycle 2.0.35
# requires compileSdk 36+ — an upstream incompatibility that breaks every
# Android release build regardless of any setting in this app's own
# build.gradle.kts. Pinned back to the last version known not to require
# compileSdk 36 until file_picker ships a fix. Remove this override (and
# re-verify `flutter build appbundle --release`) the next time file_picker
# or its android/build.gradle is upgraded.
dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.24
